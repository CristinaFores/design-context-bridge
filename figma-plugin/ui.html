<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, sans-serif;
    font-size: 11px;
    color: #1a1a1a;
    background: #fff;
    overflow-y: auto;
  }
  .header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-weight: 600; font-size: 12px; }
  .count { color: #888; font-size: 10px; }
  .empty {
    padding: 24px 12px;
    text-align: center;
    color: #aaa;
    font-size: 11px;
    line-height: 1.5;
  }
  .section { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
  .section-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #999;
    margin-bottom: 6px;
  }
  /* Colors */
  .swatches { display: flex; flex-wrap: wrap; gap: 5px; }
  .swatch-item { display: flex; align-items: center; gap: 5px; }
  .swatch {
    width: 16px; height: 16px; border-radius: 3px;
    border: 1px solid rgba(0,0,0,.1); flex-shrink: 0;
  }
  .swatch-hex { font-size: 10px; color: #555; font-family: monospace; }
  /* Typography */
  .text-row { margin-bottom: 4px; }
  .text-meta { color: #777; font-size: 10px; }
  .text-preview {
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }
  /* Spacing */
  .spacing-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .spacing-chip {
    background: #f4f4f4;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    color: #444;
    font-family: monospace;
  }
  .spacing-name { font-size: 10px; color: #888; margin-bottom: 3px; }
  /* Optional export panel */
  .export-panel {
    padding: 8px 12px 10px;
    border-top: 1px solid #eee;
    background: #fafafa;
  }
  .export-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .dot.connected { background: #18a247; }
  .dot.error { background: #e5a03e; }
  .export-title { font-weight: 600; font-size: 10px; color: #444; }
  .badge {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    background: #ececec;
    border-radius: 3px;
    padding: 1px 5px;
  }
  .export-status { color: #888; font-size: 10px; line-height: 1.45; margin-bottom: 6px; }
  .export-actions { display: flex; gap: 6px; }
  button {
    font-family: inherit; font-size: 10px;
    padding: 4px 8px; border-radius: 4px;
    border: 1px solid #ddd; background: #f5f5f5;
    cursor: pointer; white-space: nowrap;
  }
  button.primary { background: #0d99ff; border-color: #0d99ff; color: #fff; }
  button:disabled { opacity: 0.45; cursor: default; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Design Inspector</span>
  <span class="count" id="count">No selection</span>
</div>

<div id="main">
  <div class="empty">Select a layer to inspect its design properties.</div>
</div>

<div class="export-panel">
  <div class="export-head">
    <div class="dot" id="dot"></div>
    <span class="export-title">Local handoff export</span>
    <span class="badge">Optional</span>
  </div>
  <div class="export-status" id="exportStatus">Inspecting works with no setup. To export a snapshot, start the local handoff tool on your machine (localhost:3055), then press Export.</div>
  <div class="export-actions">
    <button id="exportBtn" class="primary">Export selection</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>
</div>

<script>
  var countEl = document.getElementById('count');
  var mainEl = document.getElementById('main');
  var dot = document.getElementById('dot');
  var exportStatus = document.getElementById('exportStatus');
  var exportBtn = document.getElementById('exportBtn');
  var stopBtn = document.getElementById('stopBtn');
  var exporting = false;

  exportBtn.onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'sync' } }, '*');
  };
  stopBtn.onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'pause' } }, '*');
  };

  function hex(h) {
    return '<div class="swatch-item"><div class="swatch" style="background:' + h + '"></div><span class="swatch-hex">' + h + '</span></div>';
  }

  function renderInspect(msg) {
    var count = msg.count || 0;
    countEl.textContent = count === 0 ? 'No selection' : count + ' layer' + (count === 1 ? '' : 's');

    if (count === 0) {
      mainEl.innerHTML = '<div class="empty">Select a layer to inspect its design properties.</div>';
      return;
    }

    var html = '';

    // Colors
    if (msg.colors && msg.colors.length > 0) {
      html += '<div class="section"><div class="section-label">Colors</div><div class="swatches">';
      msg.colors.forEach(function (c) { html += hex(c.hex); });
      html += '</div></div>';
    }

    // Typography
    if (msg.texts && msg.texts.length > 0) {
      html += '<div class="section"><div class="section-label">Typography</div>';
      var seen = {};
      msg.texts.forEach(function (t) {
        var key = t.fontFamily + '-' + t.fontSize;
        if (seen[key]) return;
        seen[key] = true;
        html += '<div class="text-row">';
        html += '<div class="text-meta">' + (t.fontFamily || '—') + ' · ' + (t.fontSize || '—') + 'px</div>';
        if (t.characters) {
          html += '<div class="text-preview">' + t.characters.slice(0, 60).replace(/</g, '&lt;') + '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    // Spacing
    if (msg.spacing && msg.spacing.length > 0) {
      html += '<div class="section"><div class="section-label">Spacing &amp; Layout</div>';
      msg.spacing.forEach(function (s) {
        html += '<div class="spacing-name">' + s.name + ' (' + s.layoutMode + ')</div>';
        html += '<div class="spacing-row">';
        if (s.itemSpacing != null) html += '<span class="spacing-chip">gap ' + s.itemSpacing + '</span>';
        var p = s.padding;
        if (p) {
          html += '<span class="spacing-chip">↑' + p.top + '</span>';
          html += '<span class="spacing-chip">→' + p.right + '</span>';
          html += '<span class="spacing-chip">↓' + p.bottom + '</span>';
          html += '<span class="spacing-chip">←' + p.left + '</span>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    if (!html) {
      html = '<div class="empty">No colors, text, or layout found in selection.</div>';
    }

    mainEl.innerHTML = html;
  }

  function renderStatus(msg) {
    exporting = !!msg.syncEnabled;
    exportBtn.disabled = exporting;
    stopBtn.disabled = !exporting;

    if (!exporting) {
      dot.className = 'dot';
      exportStatus.textContent = 'Inspecting works with no setup. To export a snapshot, start the local handoff tool on your machine (localhost:3055), then press Export.';
    } else if (msg.connected) {
      dot.className = 'dot connected';
      exportStatus.textContent = 'Connected — exporting your selection to the local handoff tool.';
    } else {
      dot.className = 'dot error';
      exportStatus.textContent = 'Waiting for the local handoff tool on localhost:3055. This is expected until you start it — export is optional and everything else keeps working.';
    }
  }

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'inspect') renderInspect(msg);
    if (msg.type === 'status') renderStatus(msg);
  };
</script>
</body>
</html>
